default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: obsidian-cli
      description: Interact with Obsidian vaults using the Obsidian CLI to read, create, search, and manage notes, tasks, properties, and more. Also supports plugin and theme development. Use when the user asks to interact with their Obsidian vault, manage notes, search vault content, or develop Obsidian plugins.
      source: https://github.com/kepano/obsidian-skills/blob/main/skills/obsidian-cli/SKILL.md

    - name: caveman
      description: Ultra-compressed communication mode. Cuts token usage ~75% by speaking like caveman while keeping full technical accuracy. Supports intensity levels: lite, full (default), ultra, wenyan-lite, wenyan-full, wenyan-ultra. Use when the user says "caveman mode", "talk like caveman", "less tokens", or invokes /caveman.
      source: /Users/guy/dev/ai/ai-tools/caveman/skills/caveman/SKILL.md

    - name: gws
      description: Use when interacting with Gmail, Google Drive, Google Calendar, or any other Google Workspace service using the gws CLI - read/send email, list/search Drive files, create/query calendar events, check inbox, manage labels, upload files, reply to threads, or run cross-service workflows like standup reports, meeting prep, or weekly digests
      source: https://github.com/googleworkspace/cli/blob/main/skills/gws-gmail/SKILL.md

    - name: skill-creator
      description: Create new skills, modify and improve existing skills, and measure skill performance. Use when users want to create a skill from scratch, edit, or optimize an existing skill, run evals to test a skill, benchmark skill performance with variance analysis, or optimize a skill's description for better triggering accuracy.
      source: /Users/guy/dev/tmp/skills/skills/skill-creator/SKILL.md

    - name: todoist
      description: Manage Todoist tasks, projects, labels, and filters via the td CLI - add, complete, view, move tasks with natural-language support
      source: /Users/guy/dev/ai/ai-tools/todoist/.claude/skills/todoist-cli/SKILL.md

    - name: walmart-cart
      description: Add items to a Walmart shopping cart using browser automation via AppleScript + Chrome JS injection. Use whenever the user wants to add groceries or products to their Walmart cart, do Walmart shopping, buy items on Walmart, or replenish supplies via Walmart.
      source: /Users/guy/dev/automation/claude-chrome-walmart/.claude/skills/walmart-cart/SKILL.md
  agents: []
  prompts:
    - name: fill-pdf
      description: Fill a PDF form using the PDFiller library - inspects fields, loads user defaults, shows a fill plan, handles signatures, and saves the result
      source: /Users/guy/dev/automation/python/pdfiller/.claude/commands/fill-pdf.md
